---

create_tracer:
  target: main
  where:
    func: main
  do:
    - inject_code:
        raw: |
          tracer.Start()
          defer tracer.Stop()
  imports:
    tracer: github.com/DataDog/dd-trace-go/v2/ddtrace/tracer

span_directive:
  target: "**"
  where:
    directive: "otelc:span"
  do:
    - expand_directive:
        template: |-
          var __dd_span *tracer.Span
          __dd_span_ctx := context.TODO()
          __dd_span, __dd_span_ctx = tracer.StartSpanFromContext(__dd_span_ctx, "{{FuncName}}")
          defer __dd_span.Finish()
  imports:
    tracer: github.com/DataDog/dd-trace-go/v2/ddtrace/tracer    
    context: context