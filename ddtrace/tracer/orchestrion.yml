---
# yaml-language-server: $schema=https://datadoghq.dev/orchestrion/schema.json
meta:
  name: github.com/DataDog/dd-trace-go/v2/ddtrace/tracer
  description: |-
    Automatically starts the github.com/DataDog/dd-trace-go/v2/ddtrace/tracer
    at the start of the application, and closes it at exit of the main function.

    Adding the `//dd:span` directive on functions creates custom spans
    representing every call to that function. The default operation (span) name
    is the name of the function, and this can be overridden using a "span.name"
    argument to the directive:

    ```go
    //dd:span span.name:custom-operation-name other:tag
    func myFunction() {
      // The default operation name would have been "myFunction"
    }
    ```

    Function literal expressions don't have a function name, and their default operation name is the value of the very
    first directive argument (if there is one). If there are no directive arguments, the operation name will remain
    blank.

    ```go
    //dd:span other:tag span.name:custom-operation-name
    myOp := func() {
      // The default operation name would have been "tag"
    }
    ```

extends:
  - ../../internal/orchestrion/gls.orchestrion.yml

aspects:
  # Automatically manage the tracer lifecycle
  - id: func main()
    join-point:
      all-of:
        - package-name: main
        - test-main: false
        - function-body:
            function:
              - name: main
              - signature: {}
    advice:
      - inject-declarations:
          imports:
            tracer: github.com/DataDog/dd-trace-go/v2/ddtrace/tracer
          # Note: it is valid to have multiple func init() in a single compile unit (e.g, `.go` file), in which case
          # they get executed in declaration order. This means it's okay for us to add a new init function if there is
          # already one in the file, but as it currently is appended AFTER all other declarations in the file, it means
          # that it will be executed last (tracing contents of previous init functions will not be possible).
          template: func init() { tracer.Start() }
      # We need to stop the tracer at the end of `main` to ensure all spans are properly flushed.
      - prepend-statements:
          imports:
            tracer: github.com/DataDog/dd-trace-go/v2/ddtrace/tracer
          template: |-
            defer tracer.Stop()

  # Create spans for each function annotated with the //dd:span directive.
  - id: '//dd:span'
    join-point:
      function-body:
        directive: 'dd:span'
    advice:
      - prepend-statements:
          imports:
            context: context
            tracer: github.com/DataDog/dd-trace-go/v2/ddtrace/tracer
          template: |-
            {{- $ctx := .Function.ArgumentOfType "context.Context" -}}
            {{- $req := .Function.ArgumentOfType "*net/http.Request" -}}
            {{- if eq $ctx "" -}}
              {{- $impl := .Function.ArgumentThatImplements "context.Context" -}}
              {{- if ne $impl "" -}}
                {{- if eq $impl "ctx" -}}
                  {{- $ctx = "__dd_span_ctx" -}}
              var __dd_span_ctx context.Context
              if ctx != nil {
                __dd_span_ctx = ctx
              } else {
                __dd_span_ctx = context.TODO()
              }
                {{- else -}}
                  {{- $ctx = "ctx" -}}
              __dd_ctxImpl := {{ $impl }}
              var ctx context.Context
              if __dd_ctxImpl != nil {
                ctx = __dd_ctxImpl
              } else {
                ctx = context.TODO()
              }
                {{- end -}}
              {{- else if ne $req "" -}}
                {{- $ctx = "ctx" -}}
              ctx := {{ $req }}.Context()
              {{- else -}}
                {{- $ctx = "ctx" -}}
              ctx := context.TODO()
              {{- end }}
            {{ end -}}

            {{ $functionName := .Function.Name -}}
            {{- $opName := $functionName -}}
            {{- range .DirectiveArgs "dd:span" -}}
              {{- if eq $opName "" -}}
                {{ $opName = .Value }}
              {{- end -}}
              {{- if eq .Key "span.name" -}}
                {{- $opName = .Value -}}
                {{- break -}}
              {{- end -}}
            {{- end -}}

            var span *tracer.Span
            span, {{ $ctx }} = tracer.StartSpanFromContext({{ $ctx }}, {{ printf "%q" $opName }},
              {{- with $functionName }}
                tracer.Tag("function-name", {{ printf "%q" $functionName }}),
              {{ end -}}
              {{- range .DirectiveArgs "dd:span" }}
                {{ if eq .Key "span.name" -}}{{- continue -}}{{- end -}}
                tracer.Tag({{ printf "%q" .Key }}, {{ printf "%q" .Value }}),
              {{- end }}
            )
            {{- with $req }}
              {{ $req }} = {{ $req }}.WithContext({{ $ctx }})
            {{- end }}

            {{ with .Function.ResultOfType "error" -}}
              defer func(){
                span.Finish(tracer.WithError({{ . }}))
              }()
            {{ else -}}
              defer span.Finish()
            {{- end -}}

  # --- GLS lifecycle for active spans (orchestrion-on-top) ---
  # The tracer source is fully GLS-agnostic: ContextWithSpan does a plain
  # context.WithValue and SpanFromContext a plain ctx.Value, so a build WITHOUT
  # orchestrion pays nothing. These tracer-internal aspects weave the whole GLS
  # lifecycle (push + popper capture, read fallback, pop, and the cross-goroutine
  # reclaim flag) into the tracer at build time, fixing the GLS over-pop and the
  # cross-goroutine leak (https://github.com/DataDog/orchestrion/issues/782).
  # The actual logic lives in internal/orchestrion (GLSActivate / GLSDeactivate /
  # WrapContext) so the injected templates stay thin and unit-testable.

  # Add the GLS bookkeeping fields to Span, and expose GLSReclaimable so
  # internal/orchestrion.contextStack.Push can drop finished entries that a
  # cross-goroutine finish left behind (its popper is a no-op off-goroutine).
  - id: Span GLS fields
    tracer-internal: true
    join-point:
      struct-definition: github.com/DataDog/dd-trace-go/v2/ddtrace/tracer.Span
    advice:
      - add-struct-field:
          name: __dd_glsPop
          type: github.com/DataDog/dd-trace-go/v2/internal/orchestrion.GLSPopper
      - add-struct-field:
          name: __dd_glsReclaimable
          type: sync/atomic.Bool
      - inject-declarations:
          template: |-
            // GLSReclaimable reports whether this span is finished and may be
            // dropped from an orchestrion GLS stack. Injected by orchestrion.
            func (s *Span) GLSReclaimable() bool {
              return s != nil && s.__dd_glsReclaimable.Load()
            }

  # On ContextWithSpan: push the span onto this goroutine's GLS stack and capture
  # a goroutine-scoped popper (first push wins, matching the in-source design).
  # GLSActivate groups the push + popper so this stays a one-liner.
  - id: Span ContextWithSpan GLS push
    tracer-internal: true
    join-point:
      all-of:
        - import-path: github.com/DataDog/dd-trace-go/v2/ddtrace/tracer
        - function-body:
            function:
              - name: ContextWithSpan
    advice:
      - prepend-statements:
          imports:
            orchestrion: github.com/DataDog/dd-trace-go/v2/internal/orchestrion
            internal: github.com/DataDog/dd-trace-go/v2/internal
          template: |-
            {{- $s := .Function.Argument 1 -}}
            if {{ $s }} != nil {
              __dd_glsPop := orchestrion.GLSActivate(internal.ActiveSpanKey, {{ $s }})
              if {{ $s }}.__dd_glsPop == nil {
                {{ $s }}.__dd_glsPop = __dd_glsPop
              }
            }

  # On SpanFromContext: wrap ctx so the subsequent ctx.Value also consults the
  # GLS when the explicit context chain has no active span.
  - id: Span SpanFromContext GLS read
    tracer-internal: true
    join-point:
      all-of:
        - import-path: github.com/DataDog/dd-trace-go/v2/ddtrace/tracer
        - function-body:
            function:
              - name: SpanFromContext
    advice:
      - prepend-statements:
          imports:
            orchestrion: github.com/DataDog/dd-trace-go/v2/internal/orchestrion
          template: |-
            {{- $ctx := .Function.Argument 0 -}}
            if {{ $ctx }} != nil {
              {{ $ctx }} = orchestrion.WrapContext({{ $ctx }})
            }

  # On Finish: deactivate the span on the GLS (mark reclaimable + run the popper
  # once). Deferred so it runs after the span is finished. GLSDeactivate groups
  # the flag set and the once-only pop.
  - id: Span Finish GLS deactivate
    tracer-internal: true
    join-point:
      function-body:
        function:
          - receiver: '*github.com/DataDog/dd-trace-go/v2/ddtrace/tracer.Span'
          - name: Finish
    advice:
      - prepend-statements:
          imports:
            orchestrion: github.com/DataDog/dd-trace-go/v2/internal/orchestrion
          template: |-
            {{- $s := .Function.Receiver -}}
            if {{ $s }} != nil {
              defer orchestrion.GLSDeactivate(&{{ $s }}.__dd_glsReclaimable, &{{ $s }}.__dd_glsPop)
            }

  # On clear (span pool recycle): reset the GLS bookkeeping so a reused, live
  # span is never wrongly treated as reclaimable or carrying a stale popper.
  - id: Span clear GLS reset
    tracer-internal: true
    join-point:
      function-body:
        function:
          - receiver: '*github.com/DataDog/dd-trace-go/v2/ddtrace/tracer.Span'
          - name: clear
    advice:
      - prepend-statements:
          template: |-
            {{- $s := .Function.Receiver -}}
            {{ $s }}.__dd_glsReclaimable.Store(false)
            {{ $s }}.__dd_glsPop = nil
