---
# This configuration introduces a way to access the Goroutine Local Storage (GLS), which is not
# meant to be used directly by end-users. This is intended to be used only by tracer internals to
# enable trace context forwarding in places where a context.Context value is not available.

gls_runtime_field:
  target: runtime
  where:
    struct: g
  do:
    - add_struct_fields:
        new_field:
          - name: __dd_gls_v2
            type: any

gls_accessors_file:
  target: runtime
  do:
    - add_file:
        file: gls_accessors.go
        path: github.com/DataDog/dd-trace-go/v2/internal/otelc

gls_goexit1_reset:
  target: runtime
  where:
    func: goexit1
  do:
    - inject_code:
        raw: "getg().__dd_gls_v2 = nil"
