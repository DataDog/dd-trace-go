name: config-audit

on:
  pull_request:
    paths:
      - 'internal/config/**'
      - 'internal/env/supported_configurations.json'
      - 'ddtrace/**'
      - 'contrib/**'
      - 'profiler/**'
      - 'scripts/configaudit/**'
      - '.github/workflows/config-audit.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run config audit
        run: |
          mkdir -p out
          (cd scripts/configaudit && GOWORK=off go run . -root ../.. -format json) > out/audit.json
          (cd scripts/configaudit && GOWORK=off go run . -root ../.. -format table) | tee out/audit.txt
      - name: Upload audit artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: config-audit
          path: out/
          retention-days: 14
      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const table = fs.readFileSync('out/audit.txt', 'utf8');
            const marker = '<!-- config-audit -->';
            const body = `${marker}\n## Config Audit\n\`\`\`\n${table}\n\`\`\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
