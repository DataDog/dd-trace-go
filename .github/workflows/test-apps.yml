name: Test Apps
"on":
  workflow_call:
    inputs:
      scenarios:
        type: string
        default: '["unit-of-work/v1","unit-of-work/v2","memory-leak/goroutine","memory-leak/heap","memory-leak/goroutine-heap"]'
        description: Scenarios to run
      'env: prod':
        type: boolean
        default: true
      'env: staging':
        type: boolean
        default: true
      'arg: rps':
        type: number
        default: 5
        description: Requests per second
      'arg: scenario_duration':
        type: string
        default: 10m
        description: Scenario duration
      'arg: profile_period':
        type: string
        default: 60s
        description: Profile period
      'arg: tags':
        type: string
        default: trigger:manual
        description: Extra DD_TAGS
      ref:
        description: The branch to run the workflow on
        required: false
        type: string
  workflow_dispatch:
    inputs:
      scenarios:
        type: string
        default: '["unit-of-work/v1","unit-of-work/v2","memory-leak/goroutine","memory-leak/heap","memory-leak/goroutine-heap"]'
        description: Scenarios to run
      'env: prod':
        type: boolean
        default: true
      'env: staging':
        type: boolean
        default: true
      'arg: rps':
        type: number
        default: 5
        description: Requests per second
      'arg: scenario_duration':
        type: string
        default: 10m
        description: Scenario duration
      'arg: profile_period':
        type: string
        default: 60s
        description: Profile period
      'arg: tags':
        type: string
        default: trigger:manual
        description: Extra DD_TAGS
env:
  DD_ENV: github
  DD_TAGS: 'github_run_id:${{ github.run_id }} github_run_number:${{ github.run_number }} ${{ inputs[''arg: tags''] }}'
permissions:
  id-token: write
  contents: read
jobs:
  job-0-0:
    name: unit-of-work/v1 (prod)
    runs-on: ubuntu-latest
    if: 'contains(fromJSON(inputs[''scenarios'']), ''unit-of-work/v1'') && inputs[''env: prod'']'
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}
      - name: Get Datadog credentials
        id: dd-sts
        uses: DataDog/dd-sts-action@639d841c72f15e4e77747bd726ef8105ce971da2
        with:
          policy: dd-trace-go
      - name: Start Agent
        uses: datadog/agent-github-action@8240b406d73cb84cd5085a3919a78f59c258da3a # v1.3.1
        with:
          api_key: ${{ steps.dd-sts.outputs.api_key }}
          datadog_site: datadoghq.com
      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          check-latest: true
          cache: true
      - name: Run Scenario
        env:
          DD_TEST_APPS_REQUESTS_PER_SECOND: '${{ inputs[''arg: rps''] }}'
          DD_TEST_APPS_TOTAL_DURATION: '${{ inputs[''arg: scenario_duration''] }}'
          DD_TEST_APPS_PROFILE_PERIOD: '${{ inputs[''arg: profile_period''] }}'
