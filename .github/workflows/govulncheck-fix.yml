name: Govulncheck Remediation

on:
  schedule:
    - cron: '00 06 * * 1'  # Mondays at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  govulncheck-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          # Pinned off `stable` (=1.26.5), which intermittently corrupts its own
          # heap mid-build (golang/go#77168). Restore `stable` once a fixed
          # 1.26.x ships.
          go-version: "1.26.4"
          cache-dependency-path: '**/go.sum'
      - name: Install govulncheck
        run: |
          source ./.github/workflows/apps/go-retry.sh
          retry_on_corruption go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan and fix vulnerabilities
        id: fix
        run: ./.github/workflows/apps/govulncheck-fix.sh
      - name: Notify Slack
        if: steps.fix.outputs.has_fixes == 'true'
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook-type: incoming-webhook
          payload: |
            {
              "dependency_list": "${{ steps.fix.outputs.dependency_list }}",
              "text": "Found Vulnerabilities",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ":x: Found Vulnerabilities"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n${{ github.workflow }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Dependencies to upgrade:*\n${{ steps.fix.outputs.dependency_list }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_GOVULNCHECK_WEBHOOK_URL }}
