name: Multi-OS Unit and Integration Tests

on:
  workflow_dispatch: # manually
    inputs:
      go-version:
        description: The Go version to use
        required: true
        type: string
      runs-on:
        description: The OS to run the tests on
        required: true
        type: string
  workflow_call:
    inputs:
      go-version:
        required: true
        type: string
      runs-on:
        required: true
        type: string

env:
  DD_APPSEC_WAF_TIMEOUT: 1m # Increase time WAF time budget to reduce CI flakiness

permissions:
  id-token: write
  contents: read

jobs:
  test-multi-os:
    runs-on: "${{ inputs.runs-on }}"
    env:
      TEST_RESULT_PATH: /tmp/test-results
      REPORT: /tmp/test-results/gotestsum-report.xml # path to where test results will be saved
      DD_APPSEC_WAF_TIMEOUT: 1h
    steps:
      - name: Normalize github.workspace for Windows
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $normalizedPath = "${{ github.workspace }}" -replace '\\', '/'
          "normalized_workspace=$normalizedPath" >> $env:GITHUB_ENV
      - name: Normalize github.workspace for non-Windows OSes
        if: ${{ runner.os != 'Windows' }}
        shell: pwsh
        run: |
          "normalized_workspace=${{ github.workspace }}" >> $env:GITHUB_ENV
      - name: Restore repo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .git
          key: gitdb-${{ github.repository_id }}-${{ github.sha }}
      - name: Checkout
        if: always()
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
          clean: false
      - name: Setup Go and development tools
        uses: ./.github/actions/setup-go
        with:
          go-version: ${{ inputs.go-version }}
          tools-dir: ${{ env.normalized_workspace }}/_tools
          tools-bin: ${{ env.normalized_workspace }}/bin
      - name: Mac OS Coreutils
        if: inputs.runs-on == 'macos-latest'
        run: brew install coreutils
      - name: Get Datadog credentials
        id: dd-sts
        continue-on-error: true
        uses: DataDog/dd-sts-action@7d2d231c02fd54a3da912e582ff87cb995d1fd30
        with:
          policy: dd-trace-go
      - name: Configure Datadog Test Optimization
        if: inputs.runs-on == 'ubuntu-latest' && steps.dd-sts.outputs.api_key != ''
        continue-on-error: true
        uses: datadog/test-visibility-github-action@v2
        with:
          languages: go
          api_key: ${{ steps.dd-sts.outputs.api_key }}
          site: datadoghq.com
      - name: "Runner: Test Core and Contrib (No Integration Tests)"
        shell: bash
        run: |
          export PATH="${{ github.workspace }}/bin:${PATH}"
          mkdir -p "${TEST_RESULT_PATH}"
          go list ./... | grep -v -e google.golang.org/api -e sarama -e confluent-kafka-go -e cmemprof | sort >packages.txt
          # shellcheck disable=SC2046
          gotestsum --junitfile "${REPORT}" -- $(cat packages.txt) -v -coverprofile=coverage.txt -covermode=atomic -timeout 15m
        env:
          JOB_ID: ${{ job.check_run_id }}

      - name: Upload the results to Datadog CI App
        if: always()
        continue-on-error: true
        uses: ./.github/actions/dd-ci-upload
        with:
          dd-api-key: ${{ steps.dd-sts.outputs.api_key }}
          path: ${{ env.TEST_RESULT_PATH }}
          tags: go:${{ inputs.go-version }},arch:${{ runner.arch }},os:${{ runner.os }}

      - name: Upload Coverage
        if: always()
        continue-on-error: true
        uses: ./.github/actions/codecov-upload
        with:
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Coverage to Datadog
        if: always()
        continue-on-error: true
        uses: DataDog/coverage-upload-github-action@d9548b1c3c4ab639d5d3ab29a1508af188975f77
        with:
          api_key: ${{ steps.dd-sts.outputs.api_key }}
          files: coverage.txt
          format: go-coverprofile
