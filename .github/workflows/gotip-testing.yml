name: Gotip Testing

on:
  schedule: # nightly
    - cron: "0 0 * * *"
  workflow_dispatch: { } # manually

env:
  TEST_RESULTS: ${{ github.workspace }}/tip-results # path to where test results will be saved

permissions:
  id-token: write
  contents: read

jobs:
  test-tip:
    runs-on: ubuntu-latest
    steps:
      - name: Get Datadog credentials
        id: dd-sts
        uses: DataDog/dd-sts-action@2e8187910199bd93129520183c093e19aa585c75
        with:
          policy: dd-trace-go

      - name: Start Datadog Agent
        run: |
          docker run -d \
            --name datadog-agent \
            -e DD_HOSTNAME="github-actions-worker" \
            -e DD_APM_ENABLED=true \
            -e DD_BIND_HOST="0.0.0.0" \
            -e DD_API_KEY="${{ steps.dd-sts.outputs.api_key }}" \
            -e DD_TEST_AGENT_HOST="localhost" \
            -e DD_TEST_AGENT_PORT=9126 \
            -p 8126:8126 \
            -p 8127:8127 \
            datadog/agent-dev:master-py3

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.ref }}
          repository: DataDog/dd-trace-go

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable
          cache-dependency-path: '**/go.sum'

      - name: Run tests with gotip (sandboxed)
        # gotip pulls and runs the latest Go toolchain. Keep that toolchain and
        # the test process inside gVisor, persisting only reports/coverage.
        uses: geomys/sandboxed-step@v1.2.1
        with:
          persist-workspace-changes: 'true'
          env: |
            DD_APPSEC_WAF_TIMEOUT=1h
            GO_CMD=gotip
            TEST_RESULTS=${{ env.TEST_RESULTS }}
          run: |-
            mkdir -p "${GITHUB_WORKSPACE}/bin"
            GOBIN="${GITHUB_WORKSPACE}/bin" go install golang.org/dl/gotip@latest
            export PATH="${GITHUB_WORKSPACE}/bin:${PATH}"
            ./scripts/install_tools.sh --bin-dir "${GITHUB_WORKSPACE}/bin"
            gotip download
            ./scripts/ci_test_core.sh

      - name: Restore workspace after sandbox
        id: restore
        if: always()
        run: |-
          artifacts=$(mktemp -d)
          if [ -d "${TEST_RESULTS}" ]; then
            cp -a "${TEST_RESULTS}" "${artifacts}/test-results"
          fi
          coverage_list="${artifacts}/coverage-files.txt"
          find . -type f \( -name 'coverage*.txt' -o -name 'profile.cov' \) -print > "${coverage_list}"
          if [ -s "${coverage_list}" ]; then
            tar -cf "${artifacts}/coverage.tar" -T "${coverage_list}"
          fi
          git reset --hard HEAD
          git clean -fdx
          if [ -d "${artifacts}/test-results" ]; then
            mkdir -p "$(dirname "${TEST_RESULTS}")"
            cp -a "${artifacts}/test-results" "${TEST_RESULTS}"
          fi
          if [ -f "${artifacts}/coverage.tar" ]; then
            tar -xf "${artifacts}/coverage.tar"
          fi

      - name: Upload the results to Datadog CI App
        if: always() && steps.restore.outcome == 'success'
        continue-on-error: true
        uses: ./.github/actions/dd-ci-upload
        with:
          dd-api-key: ${{ steps.dd-sts.outputs.api_key }}
          path: ${{ env.TEST_RESULTS }}
          tags: go:gotip,arch:${{ runner.arch }},os:${{ runner.os }}

      - name: Upload Coverage
        if: always() && steps.restore.outcome == 'success'
        continue-on-error: true
        uses: ./.github/actions/codecov-upload
        with:
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
