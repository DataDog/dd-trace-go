variables:
  # Benchmarks image is created here: https://gitlab.ddbuild.io/DataDog/apm-reliability/dd-trace-go/-/jobs/1657729516
  BENCHMARKS_CI_IMAGE: registry.ddbuild.io/ci/benchmarking-platform:dd-trace-go-111525540

unit-of-work:
  stage: test-apps
  when: manual
  image: $BENCHMARKS_CI_IMAGE
  timeout: 1h
  interruptible: true
  tags: ["runner:apm-k8s-tweaked-metal"]
  script:
    - ./.gitlab/benchmarks/test-apps/run-test-apps.sh
  variables:
    DD_ENV: "gitlab"
    # 660s is enough time to capture 10 profiles without missing the last one
    # (TODO: Implement profiler.StopFlush())
    DD_TEST_APPS_TOTAL_DURATION: "660s"
    DD_TEST_APPS_PROFILE_PERIOD: "60s"
    DD_TEST_APPS_REQUESTS_PER_SECOND: 25
