# @see https://github.com/DataDog/benchmarking-platform-tools/blob/main/images/templates/gitlab/build-ci-images.template.yml
include:
  project: 'DataDog/benchmarking-platform-tools'
  file: 'images/templates/gitlab/build-ci-images.template.yml'

variables:
  # Image suffix that is used for building dd-trace-go microbenchmarks Docker image. Don't change!
  BASE_CI_IMAGE_SUFFIX: dd-trace-go-${CI_PIPELINE_ID}

  # Benchmarks image is created here: https://gitlab.ddbuild.io/DataDog/apm-reliability/benchmarking-platform/-/jobs/1422209418
  BENCHMARKS_CI_IMAGE: 486234852809.dkr.ecr.us-east-1.amazonaws.com/ci/benchmarking-platform:dd-trace-go-96166511

  # Changes smaller than UNCONFIDENCE_THRESHOLD will be treated as a noise
  UNCONFIDENCE_THRESHOLD: 2.0

.benchmark:
  stage: microbenchmarks
  image: $BENCHMARKS_CI_IMAGE
  when: on_success
  timeout: 45m
  rules:
    - if: $CI_COMMIT_REF_NAME == "main"
      interruptible: false
    - interruptible: true
  tags: ["runner:apm-k8s-m8g-metal"]
  needs: []
  variables:
    GOTOOLCHAIN: auto
  script:
    - export GO_VERSION=$(go version | sed 's/go version //')
    - bp-runner .gitlab/benchmarks/micro/bp-runner.yml --debug
  retry:
    max: 2
    when:
      - unknown_failure
      - data_integrity_failure
      - runner_system_failure
      - scheduler_failure
      - api_failure
  artifacts:
    name: "artifacts"
    when: always
    paths:
      - artifacts/
    expire_in: "30 days"

microbenchmarks:
  extends: .benchmarks
  parallel:
    matrix:
      - BENCHMARKS: "BenchmarkStartRequestSpan|BenchmarkHttpServeTrace|BenchmarkTracerAddSpans|BenchmarkStartSpan|BenchmarkSingleSpanRetention|BenchmarkOTelApiWithCustomTags|BenchmarkInjectW3C|BenchmarkExtractW3C|BenchmarkPartialFlushing|BenchmarkConfig|BenchmarkStartSpanConfig|BenchmarkGraphQL|BenchmarkSampleWAFContext|BenchmarkCaptureStackTrace|BenchmarkSetTagString|BenchmarkSetTagStringPtr|BenchmarkSetTagMetric|BenchmarkSetTagStringer|BenchmarkSerializeSpanLinksInMeta|BenchmarkLogs|BenchmarkParallelLogs|BenchmarkMetrics|BenchmarkParallelMetrics"
        CPUS_PER_BENCHMARK: 1
        REPETITIONS: 1
        GROUP_ID: "group-1"

pr-performance-gates:
  stage: benchmarks
  needs:
    - job: microbenchmarks
  when: on_success
  tags:
    - "arch:amd64"
  image: $BASE_CI_IMAGE
  script:
    - bp-runner .gitlab/benchmarks/pr-gate.thresholds.yml --debug
  artifacts:
    name: "artifacts"
    when: always
    paths:
      - artifacts/
    expire_in: "30 days"
