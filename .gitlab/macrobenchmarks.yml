check-slo-breaches:
  stage: gates
  needs: [
    "go123-baseline",
    "go123-only-trace",
    "go123-only-trace-with-runtime-metrics",
    "go123-only-profile",
    "go123-profile-trace",
    "go123-trace-asm",
    "go123-profile-trace-asm",
    "go124-baseline",
    "go124-only-trace",
    "go124-only-trace-with-runtime-metrics",
    "go124-only-profile",
    "go124-profile-trace",
    "go124-trace-asm",
    "go124-profile-trace-asm",
  ]
  when: on_success
  tags: ["arch:amd64"]
  image: registry.ddbuild.io/images/benchmarking-platform-tools-ubuntu:latest
  script:
    - export ARTIFACTS_DIR="$(pwd)/platform/artifacts-se"
    - bp-runner .gitlab/benchmarks/bp-runner.fail-on-breach.yml
  artifacts:
    name: "artifacts"
    when: always
    paths:
      - platform/artifacts/
    expire_in: 3 months

notify-slo-breaches:
  stage: gates
  needs: ["check-slo-breaches"]
  when: on_failure
  # See https://github.com/DataDog/slack-notifier/blob/master/gitlab-pipeline-templates/v3-sdm/template.yml.
  tags: ["arch:amd64"]
  image: "registry.ddbuild.io/slack-notifier:v27936653-9a2a7db-sdm-gbi-jammy@sha256:c9d1145319d1904fa72ea97904a15200d3cb684324723f9e1700bc02cc85065c"
  variables:
    ARTIFACTS_DIR: "$(pwd)/platform/artifacts-se"
    CHANNEL: "guild-dd-trace-go-notifications"
  script:
    - |
      if [ -z "${CHANNEL:-}" ]; then
        echo "ERROR: 'CHANNEL' is required but not set. Add it to the 'variables' section of your notification job."
        exit 1
      fi
    - |
      if [ -z "${MESSAGE:-}" ]; then
        echo "Using default SLO breach detection/warning message."
        BRANCH_URL="https://github.com/DataDog/$CI_PROJECT_NAME/tree/$CI_COMMIT_REF_NAME"
        COMMIT_URL="https://github.com/DataDog/$CI_PROJECT_NAME/commit/$CI_COMMIT_SHA"
        BUILD_URL="$CI_PROJECT_URL/pipelines/$CI_PIPELINE_ID"
        
        if [ -f "$ARTIFACTS_DIR/threshold_breach_detected" ]; then
          MESSAGE=":x: <$BRANCH_URL|$CI_COMMIT_REF_NAME> <$COMMIT_URL|$CI_COMMIT_SHORT_SHA> - Performance SLOs in $CI_PROJECT_NAME were breached in <$BUILD_URL|$CI_PIPELINE_ID>! Please look into it."
        elif [ -f "$ARTIFACTS_DIR/warning_breach_detected" ]; then
          MESSAGE=":warning: <$BRANCH_URL|$CI_COMMIT_REF_NAME> <$COMMIT_URL|$CI_COMMIT_SHORT_SHA> - Performance SLOs in $CI_PROJECT_NAME are about to be breached! A warning threshold in <$BUILD_URL|$CI_PIPELINE_ID> was triggered. Please look into it."
        else
          echo "INFO: No breach detection files ('threshold_breach_detected' or 'warning_breach_detected') found in '$ARTIFACTS_DIR'. This may indicate the gating job hasn't run yet or no breaches occurred."
          exit 0
        fi
      fi
    - postmessage "$CHANNEL" "$MESSAGE"
  artifacts:
    name: "artifacts"
    when: always
    paths:
      - platform/artifacts/
    expire_in: 3 months

#
# Macro benchmarks for Service Extensions
# (using Envoy External Processing)
#

.benchmarks-serviceextensions:
  stage: macrobenchmarks
  needs: []
  tags: ["runner:apm-k8s-same-cpu"]
  timeout: 1h
  rules:
    - if: $CI_COMMIT_REF_NAME == "main"
      when: always
    - when: manual
  # If you have a problem with Gitlab cache, see Troubleshooting section in Benchmarking Platform docs
  image: $BENCHMARKS_CI_IMAGE
  script:
    - git clone --branch go/go-prof-app https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.ddbuild.io/DataDog/benchmarking-platform platform && cd platform
    - bp-runner bp-runner.envoy_serviceextension.yml --debug
  artifacts:
    name: "artifacts"
    when: always
    paths:
      - platform/artifacts-se/
    expire_in: 3 months
  variables:
    FF_USE_LEGACY_KUBERNETES_EXECUTION_STRATEGY: "true" # Important tweak for stability of benchmarks
    GO_VERSION: "1.23.0"
    ARTIFACTS_DIR: "./artifacts-se"

  # Workaround: Currently we're not running the benchmarks on every PR, but GitHub still shows them as pending.
  # By marking the benchmarks as allow_failure, this should go away. (This workaround should be removed once the
  # benchmarks get changed to run on every PR)
  allow_failure: true

  retry:
    max: 2
    when:
      - unknown_failure
      - data_integrity_failure
      - runner_system_failure
      - scheduler_failure
      - api_failure

# Scenario with external processor, webserver without tracer
se-ext_proc-appsec:
  extends: .benchmarks-serviceextensions
  variables:
    EXT_PROC: true
    ENABLE_APPSEC: true
    TRACER: false

se-ext_proc-only-tracing:
  extends: .benchmarks-serviceextensions
  variables:
    EXT_PROC: true
    ENABLE_APPSEC: false
    TRACER: false

# Scenarios without external processor, webserver with tracer
se-tracer-no-ext_proc-appsec:
  extends: .benchmarks-serviceextensions
  variables:
    EXT_PROC: false
    ENABLE_APPSEC: true
    TRACER: true

se-tracer-no-ext_proc-only-tracing:
  extends: .benchmarks-serviceextensions
  variables:
    EXT_PROC: false
    ENABLE_APPSEC: false
    TRACER: true

# Scenario without tracer, only direct connection through envoy to the webserver
se-no-tracer-no-ext_proc:
  extends: .benchmarks-serviceextensions
  variables:
    EXT_PROC: false
    TRACER: false
