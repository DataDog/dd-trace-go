---
# yaml-language-server: $schema=https://datadoghq.dev/orchestrion/schema.json
meta:
  name: github.com/DataDog/dd-trace-go/v2/crashtracker
  description: |-
    Starts the Datadog crashtracker as the first statement of main(), so the
    monitor process is established before any goroutine can crash.

    Ordering with respect to the tracer and profiler: the tracer and profiler
    aspects use inject-declarations to emit func init() calls, which run before
    main() starts. This aspect uses prepend-statements inside main(), so the
    tracer is always started before crashtracker.Start() executes.

    Note: crashes that occur during init() functions (before main() is reached)
    are not captured because SetCrashOutput is wired inside crashtracker.Start().

aspects:
  - id: func main()
    join-point:
      all-of:
        - package-name: main
        - test-main: false
        - function-body:
            function:
              - name: main
              - signature: {}
    advice:
      - prepend-statements:
          imports:
            crashtracker: github.com/DataDog/dd-trace-go/v2/crashtracker
          template: |-
            crashtracker.Start()
