---
# yaml-language-server: $schema=https://datadoghq.dev/orchestrion/schema.json
meta:
  name: github.com/DataDog/dd-trace-go/contrib/aerospike/aerospike-client-go.v7/v2
  description: Aerospike client for Go.

aspects:
  # Instrument call sites of the aerospike Client methods. Aerospike's methods
  # take no context.Context, so instead of injecting anything into the aerospike
  # library we rewrite the call expression to go through the contrib wrapper:
  #
  #     client.Put(policy, key, bins)
  #
  # becomes, when a context.Context is in scope on the enclosing function:
  #
  #     __dd_aerospike.WrapClient(client).WithContext(ctx).Put(policy, key, bins)
  #
  # or, when no context is available:
  #
  #     __dd_aerospike.WrapClient(client).Put(policy, key, bins)
  #
  # The wrapper starts/finishes the span using only its public API. When a ctx
  # is threaded in (the common HTTP/gRPC handler pattern, including calls that
  # run in a spawned goroutine that received ctx as an argument), the span is a
  # child of the span carried by that ctx. When no ctx is in scope, the span is
  # still created and the tracer's goroutine-local storage parents it to any
  # active span on the same goroutine.
  #
  # The join point is guarded so the rewrite is NEVER applied in two places:
  #
  #   1. The contrib module itself. The wrapper's methods call the raw client
  #      (c.Client.Put(...)); rewriting those would wrap the wrapper again and
  #      recurse forever.
  #
  #   2. The aerospike library itself. Injecting a reference to the contrib into
  #      the aerospike package would create an import cycle
  #      (aerospike -> contrib -> aerospike) and would also rewrite the library's
  #      internal method delegations (e.g. Query -> QueryPartitions), producing
  #      duplicate spans. Because the wrapper delegates to the raw client, that
  #      internal delegation is never instrumented and each user call yields
  #      exactly one span.
  - id: Client
    join-point:
      all-of:
        - not:
            import-path: github.com/DataDog/dd-trace-go/contrib/aerospike/aerospike-client-go.v7/v2
        - not:
            import-path: github.com/aerospike/aerospike-client-go/v7
        - one-of:
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: Put, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: PutBins, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: Append, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: AppendBins, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: Prepend, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: PrependBins, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: Add, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: AddBins, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: Delete, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: Touch, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: Exists, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: BatchExists, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: Get, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: GetHeader, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: BatchGet, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: BatchGetHeader, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: BatchGetOperate, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: Operate, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: ScanAll, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: ScanPartitions, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: BatchGetComplex, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: BatchDelete, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: BatchOperate, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: BatchExecute, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: Execute, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: ExecuteUDF, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: ExecuteUDFNode, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: QueryExecute, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: QueryPartitions, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: Query, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: QueryNode, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: ScanNode, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: Truncate, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: QueryAggregate, match: pointer-only}
            # Reflection-based Object API (aerospike-client-go's client_reflect.go,
            # //go:build !as_performance). Under -tags as_performance these methods
            # do not exist, so there are no call sites to match and these entries
            # are silent no-ops.
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: PutObject, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: GetObject, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: BatchGetObjects, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: ScanAllObjects, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: ScanNodeObjects, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: ScanPartitionObjects, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: QueryObjects, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: QueryNodeObjects, match: pointer-only}
            - method-call: {receiver: github.com/aerospike/aerospike-client-go/v7.Client, name: QueryPartitionObjects, match: pointer-only}
    advice:
      - wrap-expression:
          imports:
            __dd_aerospike: github.com/DataDog/dd-trace-go/contrib/aerospike/aerospike-client-go.v7/v2
          template: |-
            {{- $ctx := .Function.ArgumentOfType "context.Context" -}}
            {{- if $ctx -}}
            __dd_aerospike.WrapClient({{ .AST.Fun.X }}).WithContext({{ $ctx }}).{{ .AST.Fun.Name }}({{ range $i, $a := .AST.Args }}{{ if $i }}, {{ end }}{{ $a }}{{ end }}{{ if .AST.Ellipsis }}...{{ end }})
            {{- else -}}
            __dd_aerospike.WrapClient({{ .AST.Fun.X }}).{{ .AST.Fun.Name }}({{ range $i, $a := .AST.Args }}{{ if $i }}, {{ end }}{{ $a }}{{ end }}{{ if .AST.Ellipsis }}...{{ end }})
            {{- end -}}
