---
# yaml-language-server: $schema=https://datadoghq.dev/orchestrion/schema.json
meta:
  name: github.com/DataDog/dd-trace-go/contrib/aerospike/aerospike-client-go.v7/v2
  description: Aerospike client for Go.

aspects:
  - id: Client
    join-point:
      struct-definition: github.com/aerospike/aerospike-client-go/v7.Client
    advice:
      - inject-declarations:
          imports:
            tracing: github.com/DataDog/dd-trace-go/contrib/aerospike/aerospike-client-go.v7/v2/internal/tracing
          template: |-
            func __dd_startAerospikeSpan(resourceName string) *tracing.Span {
              return tracing.StartDefaultSpan(resourceName)
            }

            func __dd_finishAerospikeSpan(span *tracing.Span, err error) {
              tracing.FinishSpan(span, err)
            }

  - id: Client.Operation.Error
    join-point:
      function-body:
        one-of:
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: Add
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: AddBins
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: Append
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: AppendBins
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: BatchGetComplex
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: BatchOperate
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: Prepend
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: PrependBins
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: Put
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: PutBins
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: Touch
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: Truncate
    advice:
      - prepend-statements:
          template: |-
            {{- $name := .Function.Name -}}
            {{- $err := .Function.Result 0 -}}
            __dd_span := __dd_startAerospikeSpan({{ printf "%q" $name }})
            defer func() {
              __dd_finishAerospikeSpan(__dd_span, {{ $err }})
            }()

  - id: Client.Operation.ValueError
    join-point:
      function-body:
        one-of:
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: BatchDelete
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: BatchExecute
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: BatchExists
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: BatchGet
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: BatchGetHeader
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: BatchGetOperate
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: Delete
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: Execute
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: ExecuteUDF
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: ExecuteUDFNode
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: Exists
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: Get
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: GetHeader
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: Operate
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: Query
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: QueryExecute
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: QueryNode
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: QueryPartitions
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: ScanAll
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: ScanNode
          - function:
              - receiver: '*github.com/aerospike/aerospike-client-go/v7.Client'
              - name: ScanPartitions
    advice:
      - prepend-statements:
          template: |-
            {{- $name := .Function.Name -}}
            {{- $err := .Function.Result 1 -}}
            __dd_span := __dd_startAerospikeSpan({{ printf "%q" $name }})
            defer func() {
              __dd_finishAerospikeSpan(__dd_span, {{ $err }})
            }()
