---
# yaml-language-server: $schema=https://datadoghq.dev/orchestrion/schema.json
meta:
  name: github.com/DataDog/dd-trace-go/contrib/aerospike/aerospike-client-go.v7/v2
  description: Aerospike client for Go.

aspects:
  - id: NewClient
    join-point:
      one-of:
        - function-call: github.com/aerospike/aerospike-client-go/v7.NewClient
        - function-call: github.com/aerospike/aerospike-client-go/v7.NewClientWithPolicy
        - function-call: github.com/aerospike/aerospike-client-go/v7.NewClientWithPolicyAndHost
    advice:
      - wrap-expression:
          imports:
            as: github.com/aerospike/aerospike-client-go/v7
            aerospiketrace: github.com/DataDog/dd-trace-go/contrib/aerospike/aerospike-client-go.v7/v2
          template: |-
            func(c *as.Client, err as.Error) (*aerospiketrace.Client, as.Error) {
              if c == nil || err != nil {
                return nil, err
              }
              return aerospiketrace.WrapClient(c), nil
            }({{ . }})
