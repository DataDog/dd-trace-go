---
# yaml-language-server: $schema=https://datadoghq.dev/orchestrion/schema.json
meta:
  name: github.com/DataDog/dd-trace-go/contrib/cloud.google.com/go/pubsub.v1/v2
  description: Package pubsub provides an easy way to publish and receive Google Cloud Pub/Sub messages, hiding the details of the underlying server RPCs

aspects:
  - id: Initialize pubsubtrace
    join-point:
      struct-definition: cloud.google.com/go/pubsub.Subscription
    advice:
      - inject-declarations:
          imports:
            pubsubtrace: github.com/DataDog/dd-trace-go/v2/contrib/cloud.google.com/go/pubsubtrace
            instrumentation: github.com/DataDog/dd-trace-go/v2/instrumentation
          lang: go1.18
          template: |-
            var (
              __dd_instr *instrumentation.Instrumentation
              __dd_pstrace *pubsubtrace.Tracer
            )

            func init() {
              component := instrumentation.PackageGCPPubsub
              __dd_instr = instrumentation.Load(component)
              __dd_pstrace = pubsubtrace.NewTracer(__dd_instr, component)
            }

  ## Trace Receive ##
  - id: Subscription.Receive
    join-point:
      function-body:
        function:
          - receiver: '*cloud.google.com/go/pubsub.Subscription'
          - name: Receive
    advice:
      - prepend-statements:
          imports:
            pubsubtrace: github.com/DataDog/dd-trace-go/v2/contrib/cloud.google.com/go/pubsubtrace
          template: |-
            {{- $subscription := .Function.Receiver -}}
            {{- $handler := .Function.Argument 1 -}}
            __dd_traceFn := __dd_pstrace.TraceReceiveFunc({{ $subscription }})
            __dd_wrapHandler := func(h func(ctx context.Context, msg *Message)) func(ctx context.Context, msg *Message) {
              return func(ctx context.Context, msg *Message) {
                __dd_traceMsg := &pubsubtrace.Message{
                  ID:              msg.ID,
                  Data:            msg.Data,
                  OrderingKey:     msg.OrderingKey,
                  Attributes:      msg.Attributes,
                  DeliveryAttempt: msg.DeliveryAttempt,
                  PublishTime:     msg.PublishTime,
                }
                ctx, closeSpan := __dd_traceFn(ctx, __dd_traceMsg)
                defer closeSpan()
                h(ctx, msg)
              }
            }
            {{ $handler }} = __dd_wrapHandler({{ $handler }})

  ## Trace Publish ##
  - id: Topic.Publish
    join-point:
      function-body:
        function:
          - receiver: '*cloud.google.com/go/pubsub.Topic'
          - name: Publish
    advice:
      - prepend-statements:
          imports:
            pubsubtrace: github.com/DataDog/dd-trace-go/v2/contrib/cloud.google.com/go/pubsubtrace
          template: |-
            {{- $topic := .Function.Receiver -}}
            {{- $ctx := .Function.Argument 0 -}}
            {{- $msg := .Function.Argument 1 -}}
            {{- $publishResult := .Function.Result 0 -}}
            __dd_traceMsg := &pubsubtrace.Message{
              ID:              {{ $msg }}.ID,
              Data:            {{ $msg }}.Data,
              OrderingKey:     {{ $msg }}.OrderingKey,
              Attributes:      {{ $msg }}.Attributes,
              DeliveryAttempt: {{ $msg }}.DeliveryAttempt,
              PublishTime:     {{ $msg }}.PublishTime,
            }
            __dd_ctx, __dd_closeSpan := __dd_pstrace.TracePublish({{ $ctx }}, {{ $topic }}, __dd_traceMsg)
            {{ $ctx }} = __dd_ctx
            {{ $msg }}.Attributes = __dd_traceMsg.Attributes

            defer func() {
              {{ $publishResult }}.DDCloseSpan = __dd_closeSpan
            }()

  ## Admin / management operations ##
  # In v1, admin RPCs live on the GAPIC PublisherClient (topics), SubscriberClient
  # (subscriptions + snapshots) and SchemaClient under cloud.google.com/go/pubsub/apiv1,
  # issued over their gRPC connection. Rather than wrapping every method, we append a
  # unary client interceptor to each admin client constructor. The interceptor emits a
  # gcp.pubsub.request span for admin RPCs and forwards the data-plane RPCs (Publish,
  # Pull, Acknowledge, ...) that share the same connection untouched.
  #
  # Limitation: option.WithGRPCDialOption is ignored when option.WithGRPCConn is set,
  # so admin spans are not created for clients that reuse a pre-built grpc.ClientConn.
  # WithGRPCConn users should add pubsubtrace.UnaryAdminInterceptorV1 on their dial 
  - id: Admin client interceptor
    join-point:
      one-of:
        - function-call: cloud.google.com/go/pubsub/apiv1.NewPublisherClient
        - function-call: cloud.google.com/go/pubsub/apiv1.NewSubscriberClient
        - function-call: cloud.google.com/go/pubsub/apiv1.NewSchemaClient
    advice:
      - append-args:
          type: google.golang.org/api/option.ClientOption
          values:
            - imports:
                option: google.golang.org/api/option
                grpc: google.golang.org/grpc
                pubsubtrace: github.com/DataDog/dd-trace-go/v2/contrib/cloud.google.com/go/pubsubtrace
              template: option.WithGRPCDialOption(grpc.WithChainUnaryInterceptor(pubsubtrace.UnaryAdminInterceptorV1()))
