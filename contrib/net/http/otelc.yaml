---

server_hook:
  target: net/http
  func: ServeHTTP
  signature_contains:
    args: [http.ResponseWriter, *http.Request]
  before: TraceAndServe
  path: github.com/DataDog/dd-trace-go/contrib/net/http/v2

client_hook:
  target: net/http
  func: RoundTrip
  recv: "*Transport"
  before: ObserveRoundTrip
  after: AfterRoundTrip
  path: github.com/DataDog/dd-trace-go/contrib/net/http/v2