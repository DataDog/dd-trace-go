---

net-client:
  target: net/http
  where:
    func: RoundTrip
    recv: "*Transport"
  do:
    - inject_hooks:
        before: BeforeRoundTrip
        after: AfterRoundTrip
        path: github.com/DataDog/dd-trace-go/contrib/net/http/v2/otelc

net-server:
  target: net/http
  where:
    func: ServeHTTP
    recv: serverHandler
  do:
    - inject_hooks:
        before: BeforeServeHTTP
        after: AfterServeHTTP
        path: github.com/DataDog/dd-trace-go/contrib/net/http/v2/otelc