            - method-call:
                receiver: "go.uber.org/zap.SugaredLogger"
                name: Panic

            - method-call:
                receiver: "go.uber.org/zap.SugaredLogger"
                name: Fatal

            - method-call:
                receiver: "go.uber.org/zap.SugaredLogger"
                name: Debugf

            - method-call:
                receiver: "go.uber.org/zap.SugaredLogger"
                name: Infof

            - method-call:
                receiver: "go.uber.org/zap.SugaredLogger"
