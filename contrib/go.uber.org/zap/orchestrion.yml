---
# yaml-language-server: $schema=https://datadoghq.dev/orchestrion/schema.json
meta:
  name: github.com/DataDog/dd-trace-go/contrib/go.uber.org/zap/v2
  description: Structured, leveled logging for Go.

aspects:
  - id: Logger.Debug|Info|Warn|Error|DPanic|Panic|Fatal
    join-point:
      all-of:
        - not:
            import-path: github.com/DataDog/dd-trace-go/contrib/go.uber.org/zap/v2
        - one-of:
            - method-call:
                receiver: "go.uber.org/zap.Logger"
                name: Debug

            - method-call:
                receiver: "go.uber.org/zap.Logger"
                name: Info

            - method-call:
                receiver: "go.uber.org/zap.Logger"
                name: Warn

            - method-call:
                receiver: "go.uber.org/zap.Logger"
                name: Error

            - method-call:
                receiver: "go.uber.org/zap.Logger"
                name: DPanic

            - method-call:
                receiver: "go.uber.org/zap.Logger"
                name: Panic

            - method-call:
                receiver: "go.uber.org/zap.Logger"
                name: Fatal

    advice:
      - wrap-expression:
          imports:
            __ddzap: github.com/DataDog/dd-trace-go/contrib/go.uber.org/zap/v2
          template: |-
            {{- $ctx := .Function.ArgumentOfType "context.Context" -}}
            {{- $req := .Function.ArgumentThatImplements "github.com/DataDog/dd-trace-go/contrib/go.uber.org/zap/internal/context.ContextProvider" -}}
            {{- if $ctx -}}
              {{ .AST.Fun.X }}.With(__ddzap.TraceFields({{ $ctx }})...).{{ .AST.Fun.Name }}(
                {{ range .AST.Args }}{{ . }},
                {{ end }}
              )
            {{- else if $req -}}
              {{ .AST.Fun.X }}.With(__ddzap.TraceFields({{ $req }}.Context())...).{{ .AST.Fun.Name }}(
                {{ range .AST.Args }}{{ . }},
                {{ end }}
              )
            {{- else -}}
              {{ . }}
            {{- end -}}

  - id: SugaredLogger.Debug|Info|Warn|Error|DPanic|Panic|Fatal
